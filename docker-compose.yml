services:
  claude:
    build: .
    volumes:
      - .:/workspace
      - C:/Users/iredl/.claude:/home/claude/.claude
      - C:/Users/iredl/.claude.json:/home/claude/.claude.json
    env_file: .env
    ports:
      - "8501:8501"
    environment:
      - TAMU_BASE_URL=http://api-proxy:8080/tamu
      - VOYAGE_BASE_URL=http://api-proxy:8080/voyage
    depends_on: [api-proxy]
    stdin_open: true
    tty: true

  api-proxy:
    build: ./tools/api-proxy
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - API_PROXY_TAMU_SESSION=1000
    volumes:
      - ./logs:/workspace/logs

  app:
    build: .
    command: streamlit run app.py --server.port 8501 --server.headless true
    volumes:
      - .:/workspace
    env_file: .env
    ports:
      - "8501:8501"
    environment:
      - TAMU_BASE_URL=http://api-proxy:8080/tamu
      - VOYAGE_BASE_URL=http://api-proxy:8080/voyage
    depends_on: [api-proxy]
    restart: unless-stopped
